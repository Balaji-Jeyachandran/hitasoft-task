apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hitasoft-hpa
  namespace: hitasoft
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hitasoft-app
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50