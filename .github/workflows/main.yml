name: Hitasoft CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Docker Login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build -t $IMAGE_NAME:$IMAGE_TAG ./node-app

    - name: Push Docker Image
      run: |
        docker push $IMAGE_NAME:$IMAGE_TAG

    - name: Update Deployment Image
      run: |
        sed -i "s|image: .*|image: $IMAGE_NAME:$IMAGE_TAG|g" K8s/deployment.yml

    - name: Check Kubeconfig
      id: kubecheck
      run: |
        if [ -z "${{ secrets.KUBECONFIG }}" ]; then
          echo "kubeconfig=false" >> $GITHUB_OUTPUT
        else
          echo "kubeconfig=true" >> $GITHUB_OUTPUT
        fi

    - name: Set kubeconfig
      if: steps.kubecheck.outputs.kubeconfig == 'true'
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config

    - name: Deploy to Kubernetes
      if: steps.kubecheck.outputs.kubeconfig == 'true'
      run: |
        kubectl apply -f K8s/
        kubectl rollout status deployment/hitasoft-app -n hitasoft

    - name: Skip Deployment
      if: steps.kubecheck.outputs.kubeconfig == 'false'
      run: |
        echo " Skipping Kubernetes deployment"
        echo "Reason: No KUBECONFIG secret found"
        echo "This is expected when using Minikube (local cluster)"